name: "Sync: Code → Docs"

on:
  push:
    branches: [main]
    paths:
      - src/restaurants.js

jobs:
  sync:
    runs-on: ubuntu-latest
    # Skip if this push was itself made by the sync bot to avoid loops
    if: "!contains(github.event.head_commit.message, '[skip-sync]')"
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install OpenAI SDK
        run: npm install --no-save openai

      - name: Generate updated restaurants.md
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node .github/scripts/sync-code-to-docs.mjs

      - name: Open PR with changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if docs/restaurants.md actually changed
          if git diff --quiet docs/restaurants.md; then
            echo "No changes to docs/restaurants.md, skipping PR."
            exit 0
          fi

          BRANCH="sync/code-to-docs-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add docs/restaurants.md
          git commit -m "docs: sync restaurants.md from code update [skip-sync]"
          git push origin "$BRANCH"

          gh pr create \
            --title "docs: sync restaurant list from code change" \
            --body "$(cat <<'EOF'
          ## Automated sync: code → docs

          \`src/restaurants.js\` was updated on \`main\`. This PR reflects those changes in \`docs/restaurants.md\`.

          **Please review** that the documentation looks correct, then merge.

          > Generated by the `sync-code-to-docs` workflow using Claude.
          EOF
          )" \
            --base main \
            --head "$BRANCH"
