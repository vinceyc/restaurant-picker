name: "Sync: Docs → Code"

on:
  push:
    branches: [main]
    paths:
      - docs/restaurants.md

jobs:
  sync:
    runs-on: ubuntu-latest
    # Skip if this push was itself made by the sync bot to avoid loops
    if: "!contains(github.event.head_commit.message, '[skip-sync]')"
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Anthropic SDK
        run: npm install --no-save @anthropic-ai/sdk

      - name: Generate updated restaurants.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node .github/scripts/sync-docs-to-code.mjs

      - name: Open PR with changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if src/restaurants.js actually changed
          if git diff --quiet src/restaurants.js; then
            echo "No changes to src/restaurants.js, skipping PR."
            exit 0
          fi

          BRANCH="sync/docs-to-code-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/restaurants.js
          git commit -m "chore: sync restaurants.js from docs update [skip-sync]"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: sync restaurant list from docs change" \
            --body "$(cat <<'EOF'
          ## Automated sync: docs → code

          \`docs/restaurants.md\` was updated on \`main\`. This PR reflects those changes in \`src/restaurants.js\`.

          **Please review** that the restaurant list looks correct, then merge.

          > Generated by the `sync-docs-to-code` workflow using Claude.
          EOF
          )" \
            --base main \
            --head "$BRANCH"
